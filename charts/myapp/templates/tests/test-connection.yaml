apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "myapp.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
  annotations:
    # This annotation marks it as a helm test pod
    # It runs on `helm test <release>` and is deleted after
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox:1.35
      command: ['wget']
      args:
        - '--spider'
        - '--timeout=5'
        - 'http://{{ include "myapp.fullname" . }}:{{ .Values.service.port }}/'
  restartPolicy: Never