apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "myapp.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  app.ini: |
    [server]
    host = 0.0.0.0
    port = {{ .Values.config.APP_PORT | default "8000" }}
    workers = {{ .Values.config.APP_WORKERS | default "2" }}
    
    [logging]
    level = {{ .Values.config.APP_LOG_LEVEL | default "info" }}
    format = json
    
    [feature_flags]
    enable_debug_endpoint = {{ eq .Values.environment "dev" | ternary "true" "false" }}
    enable_metrics = true