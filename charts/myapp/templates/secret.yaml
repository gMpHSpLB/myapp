{{/*
PRODUCTION NOTE:
This template creates a Kubernetes Secret from values.
This is acceptable for local development only.
In production, replace this with an ExternalSecret resource
pointing to Vault or AWS Secrets Manager.

The externalSecretName value in values.yaml is the production path:
set it to the name of your externally-managed secret and this
template will be skipped in favour of the external one.
*/}}
{{- if not .Values.externalSecretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "myapp.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    {{/*
    helm.sh/resource-policy: keep means this Secret is NOT deleted
    when you run `helm uninstall`. Prevents accidental secret loss
    during a chart upgrade that temporarily uninstalls.
    */}}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets }}
  {{- if $value }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}