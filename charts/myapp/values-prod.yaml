# Production environment — STRICTEST settings
# Every relaxation from these defaults requires a documented reason

environment: prod

replicaCount: 3

image:
  # In prod the tag is set by CI, not hardcoded here
  # Override at deploy time: helm upgrade --set image.tag=$GIT_SHA
  tag: "1.25-alpine"
  pullPolicy: IfNotPresent

config:
  APP_ENV: "prod"
  APP_LOG_LEVEL: "warn"
  APP_WORKERS: "4"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

service:
  type: ClusterIP

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: myapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: myapp-tls
      hosts:
        - myapp.example.com

podDisruptionBudget:
  enabled: true
  minAvailable: 2  # With 3 replicas, always keep 2 up

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

networkPolicy:
  enabled: true

terminationGracePeriodSeconds: 60

# Production pods cannot be evicted if only 1 is running during scaling events
# Combined with minAvailable:2, ensures 2/3 always alive
affinity:
  podAntiAffinity:
    # REQUIRED (not preferred) in prod — hard enforcement
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: myapp
        topologyKey: kubernetes.io/hostname