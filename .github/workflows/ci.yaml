name: CI Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Registry: GitHub Container Registry (free for public, paid for private)
  REGISTRY: ghcr.io
  # Image name: org/repo
  IMAGE_NAME: ${{ github.repository_owner }}/myapp
  # Helm chart: separate OCI path
  CHART_NAME: ${{ github.repository_owner }}/charts/myapp

permissions:
  # Minimum permissions — explicitly grant only what's needed
  contents: read       # checkout
  packages: write      # push to GHCR
  id-token: write      # OIDC token for cosign keyless signing
  security-events: write  # upload SARIF scan results
  pull-requests: read  # read PR context

jobs:
  # ════════════════════════════════════════════════════════════════════
  # JOB 1: Test and validate (no cluster access, no credentials)
  #   A. Install test dependencies
  #   B. Run unit tests with coverage
  #   C. Upload test results
  #   D. Set up Helm 3.16
  #   E. Lint Helm chart (strict mode)
  #   F. Install helm-unittest plugin
  #   G. Run Helm unit tests
  #   H. Upload Helm test results
  # ════════════════════════════════════════════════════════════════════

  test:
    name: "Test + Lint"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for helm chart changelog

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "src/requirements-dev.txt"

      - name: Install test dependencies
        run: |
          pip install -r src/requirements-dev.txt
      - name: Run unit tests with coverage
        run: |
          pytest src/ \
            --verbose \
            --tb=short \
            --junit-xml=test-results.xml \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80
        # --cov-fail-under: fail CI if coverage drops below 80%

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()   # Upload even if tests fail (for debugging)
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

      - name: Set up Helm 3.16
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.3"

      - name: Lint Helm chart (strict mode)
        run: |
          helm lint ./charts/myapp \
            -f ./charts/myapp/values-dev.yaml \
            --strict
          helm lint ./charts/myapp \
            -f ./charts/myapp/values-staging.yaml \
            --strict
          helm lint ./charts/myapp \
            -f ./charts/myapp/values-prod.yaml \
            --strict

      - name: Install helm-unittest plugin
        run: |
          helm plugin install \
            https://github.com/helm-unittest/helm-unittest \
            --version v0.5.1

      - name: Run Helm unit tests
        run: |
          helm unittest ./charts/myapp \
            --output-type JUnit \
            --output-file helm-unittest-results.xml

      - name: Upload Helm test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: helm-test-results
          path: helm-unittest-results.xml

  # ════════════════════════════════════════════════════════════════════
  # JOB 2: Build and push image
  # Only runs on push to main (not on PRs — save registry costs)
  #   A. Checkout@v4
  #   B. Set up Docker Buildx
  #   C. Log in to GitHub Container Registry
  #   D. Extract Docker metadata
  #   E. Build and push multi-platform image
  #           -> BuildKit cache: store in GitHub Actions cache
  #                 - The job is performing an optimized, traceable Docker image build in CI using BuildKit.
  #                 - It caches layers in GitHub Actions cache to speed repeated builds.
  #           -> Build provenance: generates SLSA provenance attestation
  #                 - It generates provenance (SLSA-style attestations) for supply-chain security and auditing.
  #           -> SBOM: generates basic SBOM at Docker level (supplemented by Syft)
  #                 - It produces a basic SBOM and likely augments it with Syft for richer component data.
  #                 - It injects Git commit/ref/date metadata into the build so the resulting image is traceable back to source.
  #   F. Output digest for downstream jobs
  # ════════════════════════════════════════════════════════════════════
  build:
    name: "Build + Push"
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      # These outputs are used by downstream jobs
      image-digest: ${{ steps.build.outputs.digest }}
      image-ref: ${{ steps.meta.outputs.tags }}
      image-version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use docker-container driver for full BuildKit features
          driver-opts: |
            network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN is auto-provided — no manual secret needed for GHCR

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Immutable SHA tag (primary tag for GitOps)
            type=sha,format=long,prefix=sha-
            # Semantic version tag (when pushing a Git tag)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Branch name (informational only, mutable — do not use in GitOps)
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=myapp
            org.opencontainers.image.description=FastAPI microservice
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push multi-platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit cache: store in GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build provenance: generates SLSA provenance attestation
          provenance: mode=max
          # SBOM: generates basic SBOM at Docker level (supplemented by Syft)
          # Use case: Track components inside images for vulnerability scanning 
          #           or compliance; combine with scanners (Grype, Trivy) or artifact 
          #           registries that consume SBOMs.
          sbom: true
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Output digest for downstream jobs
        run: |
          echo "Built image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
  # ════════════════════════════════════════════════════════════════════
  # JOB 3: Security scan
  # Runs AFTER build so we scan the actual pushed image
  # BLOCKS the pipeline if CRITICAL CVEs found
  #     checkout@v4
  #     Run Trivy vulnerability scanner
  #     Upload Trivy scan results to GitHub Security
  #     Run Trivy config scan (Dockerfile + K8s manifests)
  # ════════════════════════════════════════════════════════════════════
  scan:
    name: "Security Scan"
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      security-events: write   # Upload SARIF to GitHub Security tab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: >-
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          # ignore-unfixed: true means only fixed vulnerabilities block the build
          # Remove this for stricter security posture
          ignore-unfixed: true
          exit-code: "1"          # Non-zero exit = job fails = pipeline blocked
          vuln-type: "os,library"

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # Upload even if scan found issues (shows in Security tab)
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-container"

      - name: Run Trivy config scan (Dockerfile + K8s manifests)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "table"
          exit-code: "0"          # Config misconfigs are warnings, not failures
          severity: "CRITICAL,HIGH"
  # ════════════════════════════════════════════════════════════════════
  # JOB 4: Cosign sign + Syft SBOM attestation
  # Keyless signing — no long-lived signing keys
  #     Install Cosign
  #     Log in to GHCR
  #     Sign image with keyless signing
  #     Install Syft for SBOM generation
  #     Generate SBOM with Syft
  #     Attest SBOM to image
  #     Upload SBOM as artifact
  #     Verify the signature (sanity check)
  # ════════════════════════════════════════════════════════════════════
  sign:
    name: "Sign + Attest"
    runs-on: ubuntu-24.04
    needs: [build, scan]   # Only sign if scan passed
    permissions:
      contents: read
      packages: write       # Push signature to GHCR
      id-token: write       # OIDC token for keyless signing
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.6.0
        with:
          cosign-release: "v2.4.1"   # Pin to specific version

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with keyless signing
        run: |
          cosign sign \
            --yes \
            --oidc-issuer=https://token.actions.githubusercontent.com \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}"
          
          # What this does:
          # 1. GitHub Actions provides OIDC token proving this job ran from this repo
          # 2. Fulcio CA (sigstore) issues a short-lived certificate bound to the OIDC identity
          # 3. Cosign signs the image digest with the certificate key
          # 4. Signature stored in OCI registry as a separate manifest
          # 5. Sigstore Rekor transparency log records the signature permanently
          # 6. Key never stored anywhere — certificate expires after the signing

      - name: Install Syft for SBOM generation
        uses: anchore/sbom-action/download-syft@v0.17.8
        with:
          syft-version: "v1.16.0"   # Pin to specific version

      - name: Generate SBOM with Syft
        run: |
          syft scan \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}" \
            --output cyclonedx-json=sbom.cyclonedx.json \
            --output spdx-json=sbom.spdx.json \
            --source-name myapp \
            --source-version "${{ github.sha }}"
          
          # CycloneDX: required by many enterprise tooling (Dependency Track, etc.)
          # SPDX: required by US government SBOM mandates (EO 14028)

      - name: Attest SBOM to image
        run: |
          cosign attest \
            --yes \
            --type cyclonedx \
            --predicate sbom.cyclonedx.json \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}"
          
          # This attaches the SBOM as a signed attestation to the image in the registry
          # Anyone with the image can retrieve and verify the SBOM:
          # cosign verify-attestation --type cyclonedx ghcr.io/org/myapp@sha256:...

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json

      - name: Verify the signature (sanity check)
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}"

  # ════════════════════════════════════════════════════════════════════
  # JOB 5: Package and push Helm chart to OCI registry
  # Runs in parallel with sign job (both depend on build)
  #     checkout@v4
  #     Set up Helm 3.16
  #     Log in to GHCR for Helm OCI
  #     Extract chart version from Chart.yaml
  #     Package Helm chart
  #     Push chart to OCI registry
  #     Verify chart in registry
  # ════════════════════════════════════════════════════════════════════
  helm-publish:
    name: "Helm Package + Push"
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm 3.16
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.3"

      - name: Log in to GHCR for Helm OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Extract chart version from Chart.yaml
        id: chart-version
        run: |
          CHART_VERSION=$(grep '^version:' charts/myapp/Chart.yaml | awk '{print $2}')
          echo "version=$CHART_VERSION" >> $GITHUB_OUTPUT
          echo "Chart version: $CHART_VERSION"

      - name: Package Helm chart
        run: |
          helm dependency update ./charts/myapp
          helm package ./charts/myapp \
            --version ${{ steps.chart-version.outputs.version }} \
            --app-version ${{ github.sha }} \
            --destination /tmp/charts/

      - name: Push chart to OCI registry
        run: |
          helm push /tmp/charts/myapp-${{ steps.chart-version.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/helm-lab
          # helm push /tmp/charts/myapp-${{ steps.chart-version.outputs.version }}.tgz \
          #   oci://${{ env.REGISTRY }}/${{ env.CHART_NAME }}            

      - name: Verify chart in registry
        run: |
          helm show chart \
            oci://${{ env.REGISTRY }}/${{ env.CHART_NAME }}/myapp \
            --version ${{ steps.chart-version.outputs.version }}
  # ════════════════════════════════════════════════════════════════════
  # JOB 6: Update GitOps repository with new image digest
  # This is the critical step that triggers ArgoCD
  #     Checkout GitOps repo
  #     Set up git identity
  #     Update dev image tag to new digest
  #     Commit and push dev update
  #     Create PR to staging (not auto-merged)
  #     Output summary
  # ════════════════════════════════════════════════════════════════════
  gitops-update:
    name: "GitOps Update"
    runs-on: ubuntu-24.04
    needs: [sign, helm-publish]   # Only after signing succeeds
    permissions:
      contents: read
    # Use GitHub Environment for secrets isolation
    environment: dev
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Gitops-Argocd_1
          token: ${{ secrets.GITOPS_PAT }}
          # GITOPS_PAT: fine-grained PAT with:
          # - Contents: write (to commit)
          # - Pull requests: write (to create PRs for staging/prod)
          # Stored in GitHub Environment 'dev', not repo secrets

      - name: Set up git identity
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@example.com"
          # Use a dedicated CI identity — not a human account
          # This makes CI commits distinguishable in git log

      - name: Update dev image tag to new digest
        run: |
          # Use full digest (not tag) for immutable reference
          # This is the most important line in the entire pipeline
          DIGEST="${{ needs.build.outputs.image-digest }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          
          echo "Updating dev environment to: $IMAGE"
          
          # Update the values file using yq (YAML processor — not sed)
          # yq is more reliable than sed for YAML manipulation
          yq -i ".image.digest = \"${DIGEST}\"" envs/dev/values.yaml
          yq -i ".image.tag = \"sha-${{ github.sha }}\"" envs/dev/values.yaml
          
          # Also record the full image reference for traceability
          yq -i ".image.repository = \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\"" envs/dev/values.yaml

      - name: Commit and push dev update
        run: |
          git add envs/dev/values.yaml
          
          # Only commit if there are changes (idempotent)
          if git diff --staged --quiet; then
            echo "No changes to commit — image tag unchanged"
            exit 0
          fi
          
          git commit -m "chore(dev): deploy ${{ github.sha }}

          Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}
          Triggered by: ${{ github.ref }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          [skip ci]"
          # [skip ci] prevents this commit from triggering another CI run
          
          git push origin main

      - name: Create PR to staging (not auto-merged)
        run: |
          DIGEST="${{ needs.build.outputs.image-digest }}"
          
          # Create a branch for the staging update
          BRANCH="staging-deploy-${{ github.sha }}"
          git checkout -b $BRANCH
          
          yq -i ".image.digest = \"${DIGEST}\"" envs/staging/values.yaml
          yq -i ".image.tag = \"sha-${{ github.sha }}\"" envs/staging/values.yaml
          
          git add envs/staging/values.yaml
          git commit -m "chore(staging): deploy ${{ github.sha }}"
          git push origin $BRANCH
          
          # Create PR using GitHub CLI
          gh pr create \
            --title "Deploy ${{ github.sha }} to staging" \
            --body "## Changes

          Deploy \`${{ env.IMAGE_NAME }}@${DIGEST}\` to staging.

          **Source commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          **CI run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          **Checklist before merging:**
          - [ ] Dev environment validated
          - [ ] No critical alerts in dev Grafana
          - [ ] QA sign-off
          
          Merging this PR will trigger ArgoCD to sync myapp-staging." \
            --base main \
            --head $BRANCH \
            --reviewer "${{ github.actor }}"
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}

      - name: Output summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'SUMMARY'
          ## Deployment Summary

          | Environment | Status |
          |---|---|
          | dev | ✅ Auto-deployed via ArgoCD |
          | staging | 🔲 PR created — requires approval |
          | prod | 🔲 Requires staging validation first |

          **Image:** `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}`

          **ArgoCD:** Once PR to staging is merged, run `argocd app sync myapp-staging`
          SUMMARY
